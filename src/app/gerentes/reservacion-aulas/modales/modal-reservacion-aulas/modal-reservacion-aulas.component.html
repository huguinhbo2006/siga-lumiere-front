<div class="modal-header bg-info">
    <h4 class="text-white">Reservaciones de aulas</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-6">
                <app-select [etiqueta]="'Aulas'" [datos]="lista" (emitidor)="alta.idAula = $event;"></app-select>
            </div>
            <div class="col-sm-6">
                <button class="btn btn-success" (click)="guardar();">Reservar</button>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-5">
                <app-texto [texto]="'Aula'"></app-texto>
            </div>
            <div class="col-sm-5">
                <app-texto [texto]="'Cupo'"></app-texto>
            </div>
            <div class="col-sm-2"></div>
        </div>
        <div class="row" *ngFor="let aula of datos">
            <div class="col-sm-5">
                <app-titulo [titulo]="aula.aula"></app-titulo>
            </div>
            <div class="col-sm-5">
                <app-titulo [titulo]="aula.cupo"></app-titulo>
            </div>
            <div class="col-sm-2">
                <i class="fas fa-times text-red amor" (click)="eliminar(aula);"></i>
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="col-sm-12 d-md-flex justify-content-md-end">
                <button class="btn btn-danger" (click)="cerrar()">Cerrar</button>
            </div>
        </div>
    </div>
</div>
