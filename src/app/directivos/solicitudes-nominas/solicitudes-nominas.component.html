<div class="card">
    <div class="card-header pb-0 bg-lumiere">
        <div class="d-flex align-items-center">
            <h5 class="mb-1 text-white">Solicitudes de nominas</h5>
        </div>
    </div>
    <div class="card-body">
        <div class="container">
            <div class="row">
                <div class="col-sm-12">
                    <app-select [etiqueta]="'Estatus'" [datos]="opciones" [dato]="0" (emitidor)="traer($event);"></app-select>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <app-datatable [configuracion]="configuracion" [datos]="datos" (emitidor)="seleccion = $event;"></app-datatable>
                </div>
            </div>
        </div>
    </div>
</div>
<app-cargando *ngIf="cargando"></app-cargando>
<app-botones *ngIf="seleccion !== undefined && seleccion.estatus === 0">
    <button class="btn btn-success" (click)="aceptar();">Aceptar</button>
    <button class="btn btn-danger" (click)="rechazar();">Rechazar</button>
</app-botones>
<app-modal [ngSwitch]="vista">
</app-modal>
