<div class="modal-header bg-{{(modificar) ? 'yellow' : 'success'}}">
    <h4 class="text-white">{{(modificar) ? 'Modificar' : 'Agregar'}} Transferencia</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-3">
                <app-input [valor]="dato.monto" [etiqueta]="'monto'" (emitidor)="dato.monto = $event"></app-input>
            </div>
            <div class="col-sm-3">
                <app-select [datos]="listas.niveles" [dato]="dato.idNivel" [etiqueta]="'Nivel'" (emitidor)="dato.idNivel = $event"></app-select>
            </div>
            <div class="col-sm-3">
                <app-select [datos]="calendarios" [dato]="dato.idCalendario" [etiqueta]="'Calendario'" (emitidor)="dato.idCalendario = $event"></app-select>
            </div>
            <div class="col-sm-3">
                <app-select [datos]="listas.sucursales" [dato]="dato.idSucursal" [etiqueta]="'Sucursal'" (emitidor)="dato.idSucursal = $event"></app-select>
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="col-sm-12 d-md-flex justify-content-md-end">
                <button class="btn btn-success" (click)="emitir()">Guardar</button>
                <button class="btn btn-danger" (click)="cerrar()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
