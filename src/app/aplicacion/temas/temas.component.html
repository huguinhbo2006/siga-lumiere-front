<div class="card">
    <div class="card-header pb-0 bg-lumiere">
        <div class="d-flex align-items-center">
            <h5 class="mb-1 text-white">Temas de {{nombreSeccion}}</h5>
        </div>
    </div>
    <div class="card-body">
        <div class="container">
            <div class="row" *ngIf="seleccion === undefined">
                <div class="col-sm-12">
                    <button class="btn btn-success" (click)="modal('nuevo')">Agregar Tema</button>
                </div>
            </div><br>
            <div class="row">
                <div class="col-sm-12">
                    <app-datatable [configuracion]="configuracion" [datos]="datos" (emitidor)="seleccion = $event;"></app-datatable>
                </div>
            </div>
        </div>
    </div>
</div>
<app-cargando *ngIf="cargando"></app-cargando>
<app-botones *ngIf="seleccion !== undefined">
    <button class="btn btn-success" (click)="modal('nuevo');">Agregar Tema</button>
    <button class="btn btn-yellow" (click)="modal('modificar');">Modificar Tema</button>
    <button class="btn btn-danger" *ngIf="!seleccion.activo" (click)="activar();">Activar Tema</button>
    <button class="btn btn-success" *ngIf="seleccion.activo" (click)="desactivar();">Desactivar Tema</button>
    <button class="btn btn-danger" (click)="eliminar();">Eliminar Tema</button>
    <button class="btn btn-info" (click)="ir();">Ir</button>
</app-botones>
<app-modal [ngSwitch]="vista">
    <app-modal-tema *ngSwitchCase="'nuevo'" [idSeccion]="idSeccion" [nombreSeccion]="nombreSeccion" [modificar]="false" (emitidor)="nuevo($event);"></app-modal-tema>
    <app-modal-tema *ngSwitchCase="'modificar'" [idSeccion]="idSeccion" [nombreSeccion]="nombreSeccion" [modificar]="true" [dato]="seleccion" (emitidor)="modificar($event);"></app-modal-tema>
</app-modal>
