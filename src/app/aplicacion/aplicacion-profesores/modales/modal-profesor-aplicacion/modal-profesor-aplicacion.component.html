<div class="modal-header bg-{{(modificar) ? 'yellow' : 'success'}}">
    <h4 class="text-white">{{(modificar) ? 'Modificar' : 'Agregar'}} Profesor</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-4">
                <app-input [valor]="dato.nombre" [etiqueta]="'Nombre'" (emitidor)="dato.nombre = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <app-input [valor]="dato.materia" [etiqueta]="'Materia'" (emitidor)="dato.materia = $event;"></app-input>
            </div>
            <div class="col-sm-4">
                <app-imagen [imagen]="dato.imagen" [valor]="dato.imagen" (emitidor)="dato.imagen = $event;"></app-imagen>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-3">
                <app-input [valor]="dato.instagram" [etiqueta]="'Instagram'" (emitidor)="dato.instagram = $event;"></app-input>
            </div>
            <div class="col-sm-3">
                <app-input [valor]="dato.facebook" [etiqueta]="'Facebook'" (emitidor)="dato.facebook = $event;"></app-input>
            </div>
            <div class="col-sm-3">
                <app-input [valor]="dato.tiktok" [etiqueta]="'Tiktok'" (emitidor)="dato.tiktok = $event;"></app-input>
            </div>
            <div class="col-sm-3">
                <app-input [valor]="dato.youtube" [etiqueta]="'Youtube'" (emitidor)="dato.youtube = $event;"></app-input>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-12">
                <app-textarea [valor]="dato.descripcion" [etiqueta]="'Descripcion'" (emitidor)="dato.descripcion = $event;"></app-textarea>
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="col-sm-12 d-md-flex justify-content-md-end">
                <button class="btn btn-success" (click)="emitir()">Guardar</button>
                <button class="btn btn-danger" (click)="cerrar()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
