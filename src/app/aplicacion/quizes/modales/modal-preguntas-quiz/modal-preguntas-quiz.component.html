<div class="modal-header bg-purple">
    <h4 class="text-white">Preguntas</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-4">
                <app-input [etiqueta]="'Numero de Preguntas'" [validacion]="'numero'" (emitidor)="numero = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <br>
                <button class="btn btn-info" (click)="crear();">Crear Preguntas</button>
            </div>
            <div class="col-sm-4">
                <app-word-texto (emitir)="procesar($event);"></app-word-texto>
            </div>
        </div>
        <div class="row" *ngIf="datos.preguntas.length > 0">
            <div class="col-sm-12">
                <app-preguntas-quiz [preguntas]="datos.preguntas" [listaLecturas]="lista" (emitidor)="datos.preguntas = $event; guardar();" (memoria)="datos.preguntas = $event;"></app-preguntas-quiz>
            </div>
        </div>
    </div>
</div>
<app-cargando *ngIf="cargando"></app-cargando>
