<div class="modal-header bg-{{(modificar) ? 'yellow' : 'success'}}">
    <h4 class="text-white">{{(modificar) ? 'Modificar' : 'Agregar'}} Lectura</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-4">
                <app-input [valor]="dato.nombre" [etiqueta]="'Nombre'" (emitidor)="dato.nombre = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <app-select [etiqueta]="'Tipo'" [datos]="tipos" [dato]="dato.tipo" (emitidor)="dato.tipo = $event;"></app-select>
            </div>
            <div class="col-sm-4" *ngIf="dato.tipo.toString() === '1'">
                <app-textarea [etiqueta]="'Lectura'" [valor]="dato.contenido" (emitidor)="dato.contenido = $event;"></app-textarea>
            </div>
            <div class="col-sm-4" *ngIf="dato.tipo.toString() === '2'">
                <app-imagen [valor]="dato.contenido" [imagen]="dato.contenido" (emitidor)="dato.contenido = $event;"></app-imagen>
            </div>
            <div class="col-sm-4">
                <app-select [datos]="listas.secciones" [dato]="dato.idSeccion" [etiqueta]="'Seccion'" (emitidor)="dato.idSeccion = $event; traerTemas();"></app-select>
            </div>
            <div class="col-sm-4">
                <app-select [datos]="listaTemas" [dato]="dato.idTema" [etiqueta]="'Tema'" (emitidor)="dato.idTema = $event; traerSubtemas();"></app-select>
            </div>
            <div class="col-sm-4">
                <app-select [datos]="listaSubtemas" [dato]="dato.idSubtema" [etiqueta]="'Subtema'" (emitidor)="dato.idSubtema = $event;"></app-select>
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="col-sm-12 d-md-flex justify-content-md-end">
                <button class="btn btn-success" (click)="emitir()">Guardar</button>
                <button class="btn btn-danger" (click)="cerrar()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
