<div class="card">
    <div class="card-header pb-0 bg-lumiere">
        <div class="d-flex align-items-center">
            <h5 class="mb-1 text-white">Tipos de escuelas</h5>
        </div>
    </div>
    <div class="card-body">
        <div class="container">
            <div class="row" *ngIf="seleccion === undefined">
                <div class="col-sm-12">
                    <button class="btn btn-success" (click)="modal('nuevo')">Agregar Tipo de escuela</button>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <app-datatable [configuracion]="configuracion" [datos]="datos" (emitidor)="seleccion = $event;"></app-datatable>
                </div>
            </div>
        </div>
    </div>
</div>

<app-botones *ngIf="seleccion !== undefined" (emitidor)="seleccion = undefined">
    <button class="btn btn-success" (click)="modal('nuevo');">Agregar Tipo de escuela</button>
    <button class="btn btn-yellow" (click)="modal('modificar');">Modificar Tipo de escuela</button>
    <button class="btn btn-danger" *ngIf="!seleccion.activo" (click)="activar();">Activar Tipo de escuela</button>
    <button class="btn btn-success" *ngIf="seleccion.activo" (click)="desactivar();">Desactivar Tipo de escuela</button>
    <button class="btn btn-danger" (click)="eliminar();">Eliminar Tipo de escuela</button>
</app-botones>
<app-modal [ngSwitch]="vista">
    <app-modal-tipo-escuela *ngSwitchCase="'nuevo'" [modificar]="false" (emitidor)="nuevo($event);"></app-modal-tipo-escuela>
    <app-modal-tipo-escuela *ngSwitchCase="'modificar'" [modificar]="true" [dato]="seleccion" (emitidor)="modificar($event);"></app-modal-tipo-escuela>
</app-modal>
