<div class="card">
    <div class="card-header pb-0 bg-lumiere">
        <div class="d-flex align-items-center">
            <h5 class="mb-1 text-white">Escuelas</h5>
        </div>
    </div>
    <div class="card-body">
        <div class="container">
            <div class="row" *ngIf="seleccion === undefined">
                <div class="col-sm-12">
                    <button class="btn btn-success" (click)="modal('nuevo')">Agregar Escuela</button>
                </div>
            </div><br>
            <div class="row">
                <div class="col-sm-12">
                    <app-select [etiqueta]="'Tipo de escuela'" [datos]="lista" (emitidor)="busqueda = $event; buscar()"></app-select>
                </div>
            </div><br>
            <div class="row">
                <div class="col-sm-12">
                    <app-datatable [configuracion]="configuracion" [datos]="datos" (emitidor)="seleccion = $event;"></app-datatable>
                </div>
            </div>
        </div>
    </div>
</div>

<app-botones *ngIf="seleccion !== undefined" (emitidor)="seleccion = undefined">
    <button class="btn btn-success" (click)="modal('nuevo');">Agregar Escuela</button>
    <button class="btn btn-yellow" (click)="modal('modificar');">Modificar Escuela</button>
    <button class="btn btn-danger" *ngIf="!seleccion.activo" (click)="activar();">Activar Escuela</button>
    <button class="btn btn-success" *ngIf="seleccion.activo" (click)="desactivar();">Desactivar Escuela</button>
    <button class="btn btn-danger" (click)="eliminar();">Eliminar Escuela</button>
</app-botones>
<app-modal [ngSwitch]="vista">
    <app-modal-escuela *ngSwitchCase="'nuevo'" [lista]="lista" [modificar]="false" (emitidor)="nuevo($event);"></app-modal-escuela>
    <app-modal-escuela *ngSwitchCase="'modificar'" [lista]="lista" [modificar]="true" [dato]="seleccion" (emitidor)="modificar($event);"></app-modal-escuela>
</app-modal>
