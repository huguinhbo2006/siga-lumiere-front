<div class="modal-header bg-gradient-info">
    <h4 class="text-white">Prospecto</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-4">
                <app-input [mayusculas]="true" [valor]="prospecto.nombre" [etiqueta]="'Nombre'" (emitidor)="prospecto.nombre = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <app-input [mayusculas]="true" [valor]="prospecto.apellidoPaterno" [etiqueta]="'Apellido Paterno'" (emitidor)="prospecto.apellidoPaterno = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <app-input [mayusculas]="true" [valor]="prospecto.apellidoMaterno" [etiqueta]="'Apellido Materno'" (emitidor)="prospecto.apellidoMaterno = $event"></app-input>
            </div>
        </div><br>
        <div class="row">
            <div class="col-sm-4">
                <app-input [valor]="prospecto.celular" [etiqueta]="'Celular'" [validacion]="'numero'" [cantidad]="10" (emitidor)="prospecto.celular = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <app-input [valor]="prospecto.promedio" [etiqueta]="'Promedio'" [validacion]="'decimal'" (emitidor)="prospecto.promedio = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <app-input [valor]="prospecto.linkFacebook" [etiqueta]="'LINK Facebook'" (emitidor)="prospecto.linkFacebook = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <app-input [valor]="prospecto.linkInstagram" [etiqueta]="'LINK Instagram'" (emitidor)="prospecto.linkInstagram = $event"></app-input>
            </div>
        </div>
        <div class="row justify-content-end">
            <button class="btn btn-success" (click)="emitir()">Guardar</button>
        </div>
    </div>
</div>
