<div class="modal-header bg-{{(modificar) ? 'yellow' : 'success'}}">
    <h4 class="text-white">{{(modificar) ? 'Modificar' : 'Agregar'}} Meta economica</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-3">
                <app-select [des]="modificar" [etiqueta]="'Empleado'" [datos]="listas.usuarios" [dato]="dato.idUsuario" (emitidor)="dato.idUsuario = $event;"></app-select>
            </div>
            <div class="col-sm-3">
                <app-select [des]="modificar" [etiqueta]="'Calendario'" [datos]="listas.calendarios" [dato]="dato.idCalendario" (emitidor)="dato.idCalendario = $event;"></app-select>
            </div>
            <div class="col-sm-3">
                <app-select [des]="modificar" [etiqueta]="'Mes'" [datos]="generales.meses" [dato]="dato.mes" (emitidor)="dato.mes = $event;"></app-select>
            </div>
            <div class="col-sm-3">
                <app-input [etiqueta]="'Meta'" [validacion]="'numero'" [valor]="dato.meta" (emitidor)="dato.meta = $event;"></app-input>
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="col-sm-12 d-md-flex justify-content-md-end">
                <button class="btn btn-success" (click)="emitir()">Guardar</button>
                <button class="btn btn-danger" (click)="cerrar()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
