<div class="card">
    <div class="card-header pb-0 bg-lumiere">
        <div class="d-flex align-items-center">
            <h5 class="mb-1 text-white">Comisiones</h5>
            <h5 class="mb-1 text-white">Comision total: ${{generales.milesNumeros(total)}} </h5>
        </div>
    </div>
    <div class="card-body">
        <div class="container">
            <div class="row">
                <div class="col-sm-4">
                    <app-select [etiqueta]="'Año'" [datos]="listas.years" (emitidor)="busqueda.year = $event;"></app-select>
                </div>
                <div class="col-sm-4">
                    <app-select [etiqueta]="'Mes'" [datos]="generales.meses" (emitidor)="busqueda.mes = $event;"></app-select>
                </div>
                <div class="col-sm-4">
                    <br>
                    <button class="btn btn-info" (click)="buscar();">Buscar</button>
                </div>
            </div><br>
            <div class="row">
                <div class="col-sm-12">
                    <app-datatable [configuracion]="configuracion" [datos]="datos" (emitidor)="seleccion = $event;"></app-datatable>
                </div>
            </div>
        </div>
    </div>
</div>
<app-cargando *ngIf="cargando"></app-cargando>
