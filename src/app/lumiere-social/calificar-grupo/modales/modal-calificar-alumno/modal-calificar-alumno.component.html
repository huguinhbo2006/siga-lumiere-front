<div class="modal-header bg-info">
    <h4 class="text-white">CALIFICADOR {{ficha.alumno}}</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-6">
                <app-select [datos]="examenes" [etiqueta]="'Examen'" (emitidor)="traerSecciones($event)"></app-select>
            </div>
            <div class="col-sm-6" *ngIf="hay">
                <div class="row">
                    <div class="col-sm-12">Promedio Exámen: {{promedioExamen}}</div>
                    <div class="col-sm-12" *ngIf="!colbach">Promedio Alumno: {{promedioAlumno}}</div>
                    <div class="col-sm-12" *ngIf="!colbach">Promedio Total: {{promedioTotal}}</div>
                    <div class="col-sm-12" *ngIf="!colbach">Promedio Aspiracion: {{puntajeCarrera}}</div>
                    <div class="col-sm-12" *ngIf="!colbach">Diferencia: {{diferencia}}</div>
                </div>
            </div>
        </div>
        <div class="row" *ngFor="let item of secciones">
            <div class="col-sm-12">
                <h6 class="text-blue">{{item.nombre}}&nbsp;&nbsp;{{item.promedio}}</h6>
            </div>
            <div class="col-sm-12" *ngFor="let sec of item.secciones">
                <app-resultados-seccion [seccion]="sec"></app-resultados-seccion>
            </div>
        </div>
        <div class="row justify-content-end">
            <button class="btn btn-success" (click)="emitir()">Guardar</button>
        </div>
    </div>
</div>
