<div class="modal-header bg-{{(modificar) ? 'yellow' : 'success'}}">
    <h4 class="text-white">{{(modificar) ? 'Modificar' : 'Agregar'}} Vale</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-4">
                <app-input [etiqueta]="'Monto'" [valor]="dato.monto" [validacion]="'decimal'" (emitidor)="dato.monto = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <app-select [etiqueta]="'Calendario'" [dato]="dato.idCalendario" [datos]="generales.calendariosActuales(listas.calendarios)" (emitidor)="dato.idCalendario = $event;"></app-select>
            </div>
            <div class="col-sm-4">
                <app-select [etiqueta]="'Niveles'" [dato]="dato.idNivel" [datos]="listas.niveles" (emitidor)="dato.idNivel = $event;"></app-select>
            </div>
            <div class="col-sm-12">
                <app-textarea [etiqueta]="'Observaciones'" [valor]="dato.observaciones" (emitidor)="dato.observaciones = $event;"></app-textarea>
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="col-sm-12 d-md-flex justify-content-md-end">
                <button class="btn btn-success" (click)="emitir()">Guardar</button>
                <button class="btn btn-danger" (click)="cerrar()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
