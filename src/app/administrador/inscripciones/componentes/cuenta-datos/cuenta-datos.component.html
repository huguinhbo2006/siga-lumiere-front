<div class="container">
    <app-cargo [lista]="listas.cargos" (emitidor)="agregarCargo($event);" *ngIf="agregar === 1"></app-cargo>
    <app-descuento [lista]="listas.descuentos" (emitidor)="agregarDescuento($event);" *ngIf="agregar === 2"></app-descuento>
    <app-abono [bancos]="listas.bancos" [conceptos]="listas.abonos" [cuentas]="listas.cuentas" [formas]="listas.formas" [metodos]="listas.metodos" [total]="total" (emitidor)="agregarAbono($event);" *ngIf="agregar === 3"></app-abono>
    <div class="row">
        <div class="col-sm-4">
            <button class="btn btn-info" (click)="agregar = 1">Agregar cargo</button>
        </div>
        <div class="col-sm-4">
            <button class="btn btn-info" (click)="agregar = 2">Agregar descuento</button>
        </div>
        <div class="col-sm-4">
            <button class="btn btn-info" (click)="agregar = 3">Agregar abono</button>
        </div>
    </div>
    <div class="row">
        <div class="col-sm-6">
            <app-input [etiqueta]="'Cupon'" [mayusculas]="true" [valor]="cupon" (emitidor)="cupon = $event"></app-input>
        </div>
        <div class="col-sm-6">
            <button class="btn btn-info" (click)="canjear()">Canjear</button>
        </div>
    </div>
    <div class="row">
        <div class="col-sm-3">
            <app-titulo [titulo]="'Concepto'"></app-titulo>
        </div>
        <div class="col-sm-2">
            <app-titulo [titulo]="'Monto'"></app-titulo>
        </div>
        <div class="col-sm-3">
            <app-titulo [titulo]="'Forma de pago'"></app-titulo>
        </div>
        <div class="col-sm-3">
            <app-titulo [titulo]="'Metodo de pago'"></app-titulo>
        </div>
        <div class="col-sm-1">

        </div>
    </div>
    <div class="row">
        <div class="col-sm-12">
            <app-titulo [color]="'blue'" [titulo]="'Cargos'"></app-titulo>
        </div>
    </div>
    <div class="row" *ngFor="let item of cuenta.cargos">
        <div class="col-sm-3">
            <app-titulo [titulo]="item.concepto"></app-titulo>
        </div>
        <div class="col-sm-2">
            <app-titulo [titulo]="'$' + generales.milesNumeros(item.monto)"></app-titulo>
        </div>
        <div class="col-sm-3">
            <app-titulo [titulo]="'-'"></app-titulo>
        </div>
        <div class="col-sm-3">
            <app-titulo [titulo]="'-'"></app-titulo>
        </div>
        <div class="col-sm-1">
            <app-titulo [color]="'red'" [titulo]="'eliminar'" (click)="quitarCargo(item)" class="amo"></app-titulo>
        </div>
    </div>
    <div class="row">
        <div class="col-sm-12">
            <app-titulo [color]="'blue'" [titulo]="'Descuentos'"></app-titulo>
        </div>
    </div>
    <div class="row" *ngFor="let item of cuenta.descuentos">
        <div class="col-sm-3">
            <app-titulo [titulo]="generales.nombre(listas.descuentos, item.idConcepto)"></app-titulo>
        </div>
        <div class="col-sm-2">
            <app-titulo [titulo]="'$' + generales.milesNumeros(item.monto)"></app-titulo>
        </div>
        <div class="col-sm-3">
            <app-titulo [titulo]="'-'"></app-titulo>
        </div>
        <div class="col-sm-3">
            <app-titulo [titulo]="'-'"></app-titulo>
        </div>
        <div class="col-sm-1">
            <app-titulo [color]="'red'" [titulo]="'eliminar'" (click)="quitarDescuento(item)" class="amo"></app-titulo>
        </div>
    </div>
    <div class="row">
        <div class="col-sm-12">
            <app-titulo [color]="'blue'" [titulo]="'Abonos'"></app-titulo>
        </div>
    </div>
    <div class="row" *ngFor="let item of cuenta.abonos">
        <div class="col-sm-3">
            <app-titulo [titulo]="generales.nombre(listas.abonos, item.idConcepto)"></app-titulo>
        </div>
        <div class="col-sm-2">
            <app-titulo [titulo]="'$' + generales.milesNumeros(item.monto)"></app-titulo>
        </div>
        <div class="col-sm-3">
            <app-titulo [titulo]="generales.nombre(listas.formas, item.idFormaPago)"></app-titulo>
        </div>
        <div class="col-sm-3">
            <app-titulo [titulo]="generales.nombre(listas.metodos, item.idMetodoPago)"></app-titulo>
        </div>
        <div class="col-sm-1">
            <app-titulo [color]="'red'" [titulo]="'eliminar'" (click)="quitarAbono(item)" class="amo"></app-titulo>
        </div>
    </div>
    <div class="row text-end">
        <div class="col-cm-12">
            <app-titulo [titulo]="'Total: $' + generales.milesNumeros(total.toString())"></app-titulo>
        </div>
    </div>
    <div class="row">
        <div class="col-sm-6 text-start">
            <button class="btn btn-success" (click)="emitirAnterior();">Anterior</button>
        </div>
        <div class="col-sm-6 text-end">
            <button class="btn btn-success" (click)="emitirSiguiente();">Siguiente</button>
        </div>
    </div>
</div>
