<div class="modal-header bg-info">
    <h4 class="text-white">Datos financieros</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-6">
                <app-select [etiqueta]="'Banco'" [datos]="bancos" [dato]="dato.idBanco" (emitidor)="dato.idBanco = $event;"></app-select>
            </div>
            <div class="col-sm-6">
                <app-select [etiqueta]="'Cuenta'" [datos]="cuentas" [dato]="dato.idCuenta" (emitidor)="dato.idCuenta = $event;"></app-select>
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="col-sm-12 d-md-flex justify-content-md-end">
                <button class="btn btn-success" (click)="emitir()">Guardar</button>
                <button class="btn btn-danger" (click)="cerrar()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
