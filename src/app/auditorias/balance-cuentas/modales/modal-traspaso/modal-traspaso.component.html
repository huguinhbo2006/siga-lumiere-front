<div class="modal-header bg-info">
    <h4 class="text-white"> Traspaso</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-4">
                <app-input [valor]="dato.monto" [etiqueta]="'Monto'" (emitidor)="dato.monto = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <app-select [dato]="dato.idFormaPago" [etiqueta]="'Forma de Pago'" [datos]="formas" (emitidor)="dato.idFormaPago = $event"></app-select>
            </div>
            <div class="col-sm-4">
                <app-select [dato]="dato.idCuenta" [etiqueta]="'Cuenta'" [datos]="cuentas" (emitidor)="dato.idCuenta = $event" *ngIf="dato.idFormaPago > 1"></app-select>
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="col-sm-6 d-md-flex justify-content-md-start">
                <b>Saldo:</b> ${{generales.milesNumeros(cuenta.totalFinal)}}
            </div>
            <div class="col-sm-6 d-md-flex justify-content-md-end">
                <button class="btn btn-success" (click)="emitir()">Guardar</button>
                <button class="btn btn-danger" (click)="cerrar()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
