<div class="modal-header bg-info">
    <h4 class="text-white">Configuracion de titulo</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-6">
                <app-input [valor]="texto" [etiqueta]="'Titulo'" (emitidor)="texto = $event"></app-input>
            </div>
            <div class="col-sm-6">
                <app-select [etiqueta]="'Clase'" [datos]="datos" [dato]="clase" (emitidor)="clase = $event;"></app-select>
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="col-sm-12 d-md-flex justify-content-md-end">
                <button class="btn btn-success" (click)="nuevo()">Guardar</button>
                <button class="btn btn-danger" (click)="cerrar()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
