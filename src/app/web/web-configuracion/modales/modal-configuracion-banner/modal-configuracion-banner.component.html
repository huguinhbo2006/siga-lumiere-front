<div class="modal-header bg-gradient-success">
    <h4 class="text-white">Configuracion del Banner</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-6">
                <app-imagen (emitidor)="banner = $event;" [imagen]="banner"></app-imagen>
            </div>
        </div><br>
        <div class="row">
            <div class="col-sm-4">
                <button class="btn btn-success" (click)="guardar()">Guardar Banner</button>
            </div>
            <div class="col-sm-4">
                <button class="btn btn-info" (click)="actualizarBanners()">Actualizar Posiciones</button>
            </div>
            <div class="col-sm-4">

            </div>
        </div><br><br>
        <div class="row">
            <div cdkDropList cdkDropListOrientation="horizontal" class="example-list" (cdkDropListDropped)="drop($event)">
                <div class="example-box" *ngFor="let imagen of listaImagenes" cdkDrag>
                    <img src="{{imagen.imagen}}" style="width: 80%; height: 80%;">
                    <span class="text-danger amo" (click)="eliminar(imagen)"><i class="fas fa-trash"></i></span>
                </div>
            </div>
        </div>
    </div>
</div>
