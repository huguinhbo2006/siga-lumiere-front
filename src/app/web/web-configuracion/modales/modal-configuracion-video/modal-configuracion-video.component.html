<div class="modal-header bg-gradient-success">
    <h4 class="text-white">Configuracion de Video</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-12">
                <app-input [etiqueta]="'URL de video'" (emitidor)="video.video = $event;" [valor]="video.video"></app-input>
            </div>
            <div class="col-sm-4">
                <app-textarea [etiqueta]="'Titulo'" (emitidor)="video.titulo = $event;" [valor]="video.titulo"></app-textarea>
            </div>
            <div class="col-sm-4">
                <app-textarea [etiqueta]="'Texto'" (emitidor)="video.texto = $event;" [valor]="video.texto"></app-textarea>
            </div>
            <div class="col-sm-4">
                <app-select [datos]="lista" [etiqueta]="'Pagina'" (emitidor)="video.idPagina = $event" [dato]="video.idPagina"></app-select>
            </div>
        </div><br>
        <div class="row justify-content-end">
            <button class="btn btn-success" (click)="nuevo()">Guardar</button>
        </div>
    </div>
</div>
