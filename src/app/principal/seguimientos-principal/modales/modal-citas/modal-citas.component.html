<div class="modal-header bg-gradient-info">
    <h4 class="text-white">Nuevo Seguimiento</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-4">
                <app-input [tipo]="'date'" [etiqueta]="'Fecha'" [valor]="cita.fecha" (emitidor)="cita.fecha = $event"></app-input>
            </div>
            <div class="col-sm-4">
                <app-textarea [etiqueta]="'Motivo'" [valor]="cita.motivo" (emitidor)="cita.motivo = $event"></app-textarea>
            </div>
            <div class="col-sm-4">
                <app-select [etiqueta]="'Sucursal'" [dato]="cita.idSucursal" (emitidor)="cita.idSucursal = $event" [datos]="listaSucursales"></app-select>
            </div>
        </div>
        <div class="row justify-content-end">
            <button class="btn btn-success" (click)="emitir()">Guardar</button>
        </div>
    </div>
</div>
