<div class="modal-header bg-gradient-info">
    <h4 class="text-white">Asignar Ficha</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-4">
                <app-input [etiqueta]="'Folio de la Ficha'" (emitidor)="folio = $event;"></app-input>
            </div>
            <div class="col-sm-4">
                <app-input [etiqueta]="'Contraseña'" [tipo]="'password'" (emitidor)="password = $event;"></app-input>
            </div>
            <div class="sol-sm-4">
                <br>
                <button class="btn btn-info" (click)="buscarFicha()">Buscar</button>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-12" *ngFor="let ficha of fichas">
                <app-ficha-alumno [ficha]="ficha" (emitidor)="fichaSeleccionada($event)"></app-ficha-alumno>
            </div>
        </div>
    </div>
</div>
