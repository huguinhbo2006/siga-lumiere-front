<div class="modal-header bg-{{(modificar) ? 'yellow' : 'success'}}">
    <h4 class="text-white">Estatus ficha</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-6">
                <app-select [datos]="estatus" [dato]="dato.estatus" [etiqueta]="'Estatus'" (emitidor)="dato.estatus = $event"></app-select>
            </div>
            <div class="col-sm-6" *ngIf="dato.estatus.toString() === '3'">
                <app-input [etiqueta]="'Monto a congelar'" [validacion]="'decimal'" (emitidor)="dato.monto = $event;"></app-input>
            </div>
        </div>
        <div class="row justify-content-end">
            <div class="col-sm-12 d-md-flex justify-content-md-end">
                <button class="btn btn-success" (click)="emitir()">Guardar</button>
                <button class="btn btn-danger" (click)="cerrar()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
