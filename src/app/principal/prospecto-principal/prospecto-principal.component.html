<div class="card shadow ">
    <div class="card-header bg-lumiere border-0">
        <div class="row align-items-center">
            <div class="col-4">
                <h3 class="mb-0 text-white">{{prospecto.nombre}}</h3>
            </div>
            <div class="col-4">
                <button class="btn bg-info text-white" (click)="verSeguimiento(seleccion);" *ngIf="seleccion !== undefined">
                        <i class="fas fa-eye"></i>
                    </button>
                <button class="btn bg-yellow text-white" (click)="modal('modificar')" *ngIf="seleccion !== undefined && seleccion.estatus.toString() !== '2'">
                        <i class="fas fa-pencil-alt"></i>
                    </button>
            </div>
            <div class="col-4">
                <button class="btn btn-success" (click)="modal('nuevo')">Nuevo Seguimiento</button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-sm-3" *ngFor="let item of seguimientos">
                <app-ver-seguimiento [seguimiento]="item" (emitidorClick)="seleccion = $event;" (emitidorDoble)="verSeguimiento($event)"></app-ver-seguimiento>
            </div>
            <div class="row">
            </div>
        </div>
    </div>
</div>
<app-modal-generico [ngSwitch]="vista">
    <app-modal-seguimiento-principal [prospecto]="rutaActiva.snapshot.params['prospecto']" [listas]="listas" *ngSwitchCase="'nuevo'" (emitidor)="guardar($event)"></app-modal-seguimiento-principal>
    <app-modal-seguimiento-principal [prospecto]="rutaActiva.snapshot.params['prospecto']" [listas]="listas" *ngSwitchCase="'modificar'" [seguimiento]="seleccion" [existe]="true" [modificar]="true" (emitidor)="modificar($event);"></app-modal-seguimiento-principal>
</app-modal-generico>
<app-cargando *ngIf="cargando"></app-cargando>
