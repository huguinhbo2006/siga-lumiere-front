<div class="card">
    <div class="card-header pb-0 bg-lumiere">
        <div class="d-flex align-items-center">
            <h5 class="mb-1 text-white">Nominas</h5>
        </div>
    </div>
    <div class="card-body">
        <div class="container">
            <div class="row" *ngIf="seleccion === undefined">
                <div class="col-sm-12">
                    <button class="btn btn-success" (click)="modal('nuevo')">Agregar Nomina</button>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">
                    <app-datatable [configuracion]="configuracion" [datos]="datos" (emitidor)="seleccion = $event; exit = true;"></app-datatable>
                </div>
            </div>
        </div>
    </div>
</div>
<app-cargando *ngIf="cargando"></app-cargando>
<app-botones *ngIf="seleccion !== undefined && exit" (emitidor)="exit = false;">
    <button class="btn btn-success" (click)="modal('nuevo');">Agregar Nomina</button>
    <button class="btn btn-yellow" (click)="ruta();">Modificar Nomina</button>
    <button class="btn btn-danger" (click)="imprimir();">Imprimir</button>
</app-botones>
<app-modal [ngSwitch]="vista">
    <app-modal-nomina *ngSwitchCase="'nuevo'" [listas]="listas" [modificar]="false" (emitidor)="nuevo($event);"></app-modal-nomina>
</app-modal>
