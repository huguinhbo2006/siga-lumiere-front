<div class="modal-header bg-success">
    <h4 class="text-white">Agregar Empleado</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
</div>
<div class="modal-body">
    <div class="container">
        <app-empleado-personales *ngIf="vista === 0"></app-empleado-personales>
        <app-empleado-domicilio *ngIf="vista === 1"></app-empleado-domicilio>
        <app-empleado-fiscales *ngIf="vista === 2"></app-empleado-fiscales>
        <app-empleado-empresa *ngIf="vista === 3"></app-empleado-empresa>
        <app-empleado-imagenes *ngIf="vista === 4"></app-empleado-imagenes>
    </div>
</div>
