<div class="modal-header bg-info">
    <h4 class="text-white">Lista de Sucursales asignadas a usuario {{usuario.nombre}}</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
</div>
<div class="modal-body">
    <div class="container">
        <div class="row">
            <div class="col-sm-8">
                <app-select [id]="'sucursales'" [etiqueta]="'Selecciona una sucursal'" [datos]="lista" [dato]="sucursal" (emitidor)="sucursal = $event"></app-select>
            </div>
            <div class="col-sm-2">
                <br>
                <button class="btn btn-success" (click)="guardar()">Agregar</button>
            </div>
            <div class="col-sm-2" *ngIf="seleccion !== undefined">
                <br>
                <button class="btn btn-danger" (click)="eliminar()">Eliminar</button>
            </div>
        </div>
        <app-datatable [id]="'tbl'" (emitidor)="seleccion = $event" [datos]="datos" [configuracion]="configuracion"></app-datatable>
    </div>
</div>
